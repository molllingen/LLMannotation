<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Annotation Tool</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
        #status { color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 AI 自動化流程啟動器</h2>
    
    <label for="geminiKey">1. 您的 Gemini API Key:</label>
    <input type="password" id="geminiKey" placeholder="請貼上 AIZA... 開頭的 Key">

    <label for="folderId">2. Google Drive 資料夾 ID:</label>
    <input type="text" id="folderId" placeholder="請輸入已分享的資料夾 ID">

    <button onclick="startN8n()">啟動流程</button>
    
    <p id="status"></p>
</div>

<script>
    async function startN8n() {
        const statusElement = document.getElementById('status');
        const geminiKey = document.getElementById('geminiKey').value;
        const folderId = document.getElementById('folderId').value;
        const n8nWebhookUrl = 'https://nubbliest-congruently-vicenta.ngrok-free.dev/webhook-test/ocr';

        if (!geminiKey || !folderId) {
            alert('請填寫完整資訊！');
            return;
        }

        statusElement.innerText = "⏳ 正在傳送請求至 n8n...";

        try {
            const response = await fetch(n8nWebhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                // 這裡打包要傳給 n8n 的變數
                body: JSON.stringify({
                    user_gemini_key: geminiKey,
                    google_folder_id: folderId
                })
            });

            if (response.ok) {
                const result = await response.json();
                statusElement.innerText = "✅ 成功！n8n 已接收並開始處理。";
                console.log('n8n Response:', result);
            } else {
                const errorData = await response.text();
                statusElement.innerText = "❌ 失敗：" + response.status;
                alert("傳送失敗，請確認 n8n 是否有點擊 'Listen for test event'");
            }
        } catch (error) {
            console.error('Error:', error);
            statusElement.innerText = "❌ 連線錯誤，請檢查 ngrok 或 CORS 設定。";
            alert("連線錯誤！請檢查您的 n8n 容器是否已開啟 N8N_CORS_ALLOWED_ORIGINS=*");
        }
    }
</script>

</body>
</html>
